server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Sandpack stub — served over HTTPS so browser can load it as an iframe.
    # Replaces the broken codesandbox bundler with a friendly fallback page.
    location /sandpack-stub {
        add_header Content-Type text/html;
        add_header X-Frame-Options ALLOWALL;
        add_header Access-Control-Allow-Origin *;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#1e1e2e;color:#cdd6f4;font-family:ui-monospace,monospace;
display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
.box{max-width:420px;padding:2rem}
h3{color:#89b4fa;margin:0 0 .75rem}
p{color:#a6adc8;font-size:.875rem;line-height:1.6;margin:0 0 1rem}
code{background:#313244;padding:.2em .4em;border-radius:4px;color:#cba6f7;font-size:.85em}
</style></head><body><div class="box">
<h3>Chart Preview</h3>
<p>React preview is not available in this environment.<br>
Ask the model to use a <code>Mermaid</code> artifact instead.</p>
<p>Example: <em>"Show this as a mermaid bar chart"</em></p>
</div></body></html>';
    }

    location / {
        proxy_pass http://librechat:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 80;
    return 301 https://$host$request_uri;
}
